<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dovme Prova</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #info {
            position: fixed; top: 10px; width: 100%; text-align: center;
            z-index: 1; color: white; font-family: sans-serif;
            background: rgba(0,0,0,0.5); padding: 5px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="info">Kamerayi kendine/koluna tut. Dovme havada duracak.</div>
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <img id="my-flash" src="https://yigit-candemir-debug.github.io/flashbook1/flash1.png" crossorigin="anonymous">
        </a-assets>

        <a-entity position="0 1.6 -1">
            <a-image 
                src="#my-flash" 
                width="2" 
                height="2" 
                transparent="true" 
                shader="flat">
            </a-image>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
