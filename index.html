<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dovme Prova</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.7); color: white; padding: 10px;
            border-radius: 5px; z-index: 1000; font-family: sans-serif;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div class="ui">EKRANI KONTROL ET: Dovme yukleniyor...</div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        gesture-detector
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="tattoo-img" src="https://yigit-candemir-debug.github.io/flashbook1/flash1.png" crossorigin="anonymous">
        </a-assets>

        <a-entity
            id="tattoo-model"
            geometry="primitive: plane; height: 1.5; width: 1.5"
            material="src: #tattoo-img; transparent: true; shader: flat; side: double;"
            position="0 1.5 -3" 
            class="clickable"
            gesture-handler>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
