<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dovme Prova</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        .ui {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px;
            border-radius: 10px; z-index: 999; text-align: center; width: 80%;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div class="ui">
        Dovme ekranin ortasinda belirecek.<br>
        Parmaginla surukle ve buyut.
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        gesture-detector
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="tattoo-img" src="flash1.png">
        </a-assets>

        <a-entity
            id="tattoo-model"
            geometry="primitive: plane; height: 1; width: 1"
            material="src: #tattoo-img; transparent: true; shader: flat; side: double;"
            position="0 1.5 -2" 
            rotation="0 0 0"
            scale="1 1 1"
            class="clickable"
            gesture-handler>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
