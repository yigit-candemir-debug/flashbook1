<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dovme Prova</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .ui-overlay {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; color: white; background: rgba(0,0,0,0.5);
            padding: 10px; border-radius: 20px; text-align: center; width: 80%;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div class="ui-overlay">
        Dovmeyi parmaginla surukle, buyut veya dondur.
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        gesture-detector
        renderer="logarithmicDepthBuffer: true;"
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="dovme" src="flash1.png">
        </a-assets>

        <a-entity
            id="dovme-model"
            geometry="primitive: plane; height: 1.5; width: 1.5"
            material="src: #dovme; transparent: true; opacity: 0.9;"
            position="0 0 -3"
            rotation="0 0 0"
            class="clickable"
            gesture-handler>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
